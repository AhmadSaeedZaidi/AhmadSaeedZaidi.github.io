title: "Ahmad Saeed's Dev Blog"
description: "ML & MLSys blog and notes"
url: "https://ahmadsaeedzaidi.github.io"
baseurl: ""

# Theme
remote_theme: "mmistakes/minimal-mistakes"

# Build settings
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  hard_wrap: false
  math_engine: mathjax
  syntax_highlighter: rouge
permalink: /:title/

# Plugins (GitHub Pages 허용 목록)
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-include-cache

# Collections
collections:
  about:
    output: true
    permalink: /about/:path/

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      mathjax: true
      show_excerpts: false

# Pagination (optional)
paginate: 5
paginate_path: "/page:num/"

# Minimal Mistakes options
minimal_mistakes_skin: "default"
search: true

include: ["_pages"]
show_date: true
date_format: "%b %d, %Y"

sass:
  sass_dir: _sass


# Author (optional)
author:
  name: "Ahmad Saeed Zaidi"
  avatar: "/assets/images/profile.png"
  bio: "Senior @ GIKI<br>ML & MLSys"
  links:
    - label: "GitHub"
      icon: "fab fa-github"
      url: "https://github.com/AhmadSaeedZaidi"
    - label: "LinkedIn"
      icon: "fab fa-linkedin"
      url: "https://www.linkedin.com/in/ahmadsaeedzaidi/"
    - label: "Email"
      icon: "fas fa-envelope"
      url: "mailto:ahmadsaeedzaidi@gmail.com"
